# packaging/nfpm.yaml
# Used by release.sh — placeholders are substituted before running nfpm.
# Manual local test:
#   nfpm package --packager deb --config packaging/nfpm.yaml --target dist/

name: "lazy-cron"
arch: "__ARCH__"
platform: "linux"
version: "__VERSION__"
section: "utils"
priority: "optional"
maintainer: "domenez-dev <bouzara.zakaria.25@gmail.com>"
description: |
  lazy-cron - a terminal UI cron job manager for Linux.
  Manage user and system cron jobs interactively from your terminal.
homepage: "https://github.com/domenez-dev/lazy-cron"
license: "MIT"

contents:
  - src: __BIN__
    dst: /usr/bin/lazy-cron
    file_info:
      mode: 0755

  - src: packaging/lazy-cron.1
    dst: /usr/share/man/man1/lazy-cron.1
    file_info:
      mode: 0644

  - src: README.md
    dst: /usr/share/doc/lazy-cron/README.md
    file_info:
      mode: 0644
